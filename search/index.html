<script>
  
  const css_Path = "https://www.unkillablevillain-blog.online/waifu/waifu.css";
  const json_Path = "https://www.unkillablevillain-blog.online/waifu/waifu-tips.json";
  const model_path = "https://www.unkillablevillain-blog.online/Resources/";   
  const q_Path = "https://www.unkillablevillain-blog.online/waifu/waifu-tips.js";
  const live2dcubismcore_path = "https://www.unkillablevillain-blog.online/waifu/live2dcubismcore.js";
  const live2d_sdk_path = "https://www.unkillablevillain-blog.online/waifu/live2d-sdk.js";

  const config = {
    path: {
      homePath: "/",
      modelPath: model_path,    
      cssPath: css_Path,
      tipsJsonPath: json_Path,
      tipsJsPath: q_Path,
      live2dCorePath: live2dcubismcore_path,
      live2dSdkPath: live2d_sdk_path
    },
    tools: ["hitokoto", "asteroids", "express","photo",],
    drag: {
      enable: false,
      direction: ["x", "y"]
    },
    switchType: "order"
  }

  
  if (screen.width >= 768) {
    Promise.all([
      loadExternalResource(config.path.cssPath, "css"),
      loadExternalResource(config.path.live2dCorePath, "js"),
      loadExternalResource(config.path.live2dSdkPath, "js"),
      loadExternalResource(config.path.tipsJsPath, "js")
    ]).then(() => {
      initWidget({
        waifuPath: config.path.tipsJsonPath,
        cdnPath: config.path.modelPath,
        tools: config.tools,
        dragEnable: config.drag.enable,
        dragDirection: config.drag.direction,
        switchType: config.switchType
      });
    });
  }

  function loadExternalResource(url, type) {
    return new Promise((resolve, reject) => {
      let tag;
      if (type === "css") {
        tag = document.createElement("link");
        tag.rel = "stylesheet";
        tag.href = url;
      } else if (type === "js") {
        tag = document.createElement("script");
        tag.src = url;
      }
      if (tag) {
        tag.onload = () => resolve(url);
        tag.onerror = () => reject(url);
        document.head.appendChild(tag);
      }
    });
  }
</script>
