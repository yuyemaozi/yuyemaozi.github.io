<script>
(function () {
  'use strict';

  const selector = [
    '.article-list article',
    '.article-list--compact article',
    '.article-list--tile article',
    '.archives-group article',
    '.archives-group .article-time--item'
  ].join(', ');

  if (window.__blogReveal && typeof window.__blogReveal.observe === 'function') {
    window.__blogReveal.observe(document);
    return;
  }

  const state = window.__blogReveal = {
    queued: new Set(),
    visible: new Set(),
    observe,
    queuedFrame: 0,
    visibleFrame: 0
  };

  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (!entry.isIntersecting) return;
      state.visible.add(entry.target);
      revealObserver.unobserve(entry.target);
    });

    if (!state.visibleFrame) {
      state.visibleFrame = requestAnimationFrame(showVisibleCards);
    }
  }, {
    threshold: 0.08,
    rootMargin: '0px 0px -80px 0px'
  });

  function collect(root) {
    if (!root || (root.nodeType !== 1 && root.nodeType !== 9)) return;

    if (root.nodeType === 1 && root.matches(selector)) {
      state.queued.add(root);
    }

    root.querySelectorAll?.(selector).forEach((el) => {
      state.queued.add(el);
    });

    if (!state.queuedFrame) {
      state.queuedFrame = requestAnimationFrame(flushQueuedCards);
    }
  }

  function observe(root) {
    collect(root || document);
  }

  function flushQueuedCards() {
    state.queuedFrame = 0;
    let index = 0;

    state.queued.forEach((el) => {
      state.queued.delete(el);
      if (el.classList.contains('observed-reveal') || el.classList.contains('reveal-visible')) return;

      el.style.setProperty('--reveal-index', Math.min(index, 8));
      el.classList.add('observed-reveal');
      revealObserver.observe(el);
      index++;
    });
  }

  function showVisibleCards() {
    state.visibleFrame = 0;

    state.visible.forEach((el) => {
      state.visible.delete(el);
      el.classList.add('reveal-visible');

      window.setTimeout(() => {
        el.classList.add('reveal-done');
      }, 760);
    });
  }

  function observeInitialCards() {
    observe(document);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', observeInitialCards, { once: true });
  } else {
    observeInitialCards();
  }

  const domObserver = new MutationObserver((mutations) => {
    mutations.forEach((mutation) => {
      mutation.addedNodes.forEach(collect);
    });
  });

  domObserver.observe(document.body || document.documentElement, {
    childList: true,
    subtree: true
  });
})();
</script>

  if (DAYS.length === 0) return;

  
  var days = DAYS.map(function(d) {
    var tasks = [];
    var lines = d.raw.split('\n');
    for (var i = 0; i < lines.length; i++) {
      var tm = lines[i].match(/^[-*]\s*\[([ x])\]\s*(.+?)[：:](\S.*?)(?:\s*\((\d+\.?\d*)h\))?\s*$/);
      if (tm) tasks.push({ done: tm[1]==='x', category: tm[2].trim(), text: tm[3].trim(), hours: tm[4]?parseFloat(tm[4]):0 });
    }
    return { date: d.date, tasks: tasks };
  });
  

  var PER_PAGE = window.innerWidth < 768 ? 3 : 5;
  var curPage = 0;
  var totalPages = Math.ceil(days.length / PER_PAGE);

  function getPageDays() { var s = curPage * PER_PAGE; return days.slice(s, s + PER_PAGE); }

  
  function calcStats() {
    var now = new Date(); now.setHours(0,0,0,0);
    var ws = new Date(now); ws.setDate(now.getDate() - now.getDay());
    var ms = new Date(now.getFullYear(), now.getMonth(), 1);
    function z(){ return{done:0,total:0,hours:0}; } var a=z(),w=z(),m=z();
    for (var i=0;i<days.length;i++) {
      var d=new Date(days[i].date+'T00:00:00'), dd=0, dh=0;
      for (var j=0;j<days[i].tasks.length;j++) { if (days[i].tasks[j].done) { dd++; dh+=days[i].tasks[j].hours; } }
      a.done+=dd; a.total+=days[i].tasks.length; a.hours+=dh;
      if (d>=ws) { w.done+=dd; w.total+=days[i].tasks.length; w.hours+=dh; }
      if (d>=ms) { m.done+=dd; m.total+=days[i].tasks.length; m.hours+=dh; }
    }
    return {all:a,week:w,month:m};
  }

  function renderStats(s) {
    function card(k,l){return'<div class="tasks-stat-card"><span class="stat-period">'+l+'</span><span class="stat-num">'+s[k].done+'/'+s[k].total+'</span><span class="stat-label">完成任务</span><span class="stat-num">'+s[k].hours.toFixed(1)+'h</span><span class="stat-label">花费时间</span></div>';}
    document.getElementById('stats-container').innerHTML=card('all','\u5168\u90e8')+(window.innerWidth<768?'':card('month','\u672c\u6708'))+card('week','\u672c\u5468');
  }
  renderStats(calcStats());

  
  var WD = ['\u65e5','\u4e00','\u4e8c','\u4e09','\u56db','\u4e94','\u516d'];
  function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML;}

  function renderPage() {
    var pd = getPageDays();
    var tabs='', sec='', i, j, d, wd, mm, done, th, cats, keys, t, icon, cls;

    
    for (i=0;i<pd.length;i++) {
      d=new Date(pd[i].date+'T00:00:00'); wd=WD[d.getDay()];
      mm=(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0');
      done=0; for(j=0;j<pd[i].tasks.length;j++){if(pd[i].tasks[j].done)done++;}
      tabs+='<div class="day-tab'+(i===0?' active':'')+'" data-idx="'+i+'"><span class="day-weekday">\u5468'+wd+'</span><span class="day-date">'+mm+'</span><span class="day-count">'+done+'/'+pd[i].tasks.length+'</span></div>';
    }
    document.getElementById('day-tabs').innerHTML=tabs;

    
    for (i=0;i<pd.length;i++) {
      d=new Date(pd[i].date+'T00:00:00'); wd=WD[d.getDay()];
      var ds=d.getFullYear()+'\u5e74'+(d.getMonth()+1)+'\u6708'+d.getDate()+'\u65e5';
      done=0; th=0; for(j=0;j<pd[i].tasks.length;j++){if(pd[i].tasks[j].done){done++;th+=pd[i].tasks[j].hours;} }
      cats={}; for(j=0;j<pd[i].tasks.length;j++){t=pd[i].tasks[j]; if(!cats[t.category])cats[t.category]=[]; cats[t.category].push(t);}
      keys=Object.keys(cats);
      sec+='<div class="day-section'+(i===0?' active':'')+'" data-idx="'+i+'">';
      sec+='<div class="day-header"><h2>'+ds+' \u5468'+wd+'</h2><span class="day-summary">\u5b8c\u6210 '+done+'/'+pd[i].tasks.length+' \xb7 \u7528\u65f6 '+th.toFixed(1)+'h</span></div>';
      if(pd[i].tasks.length===0){sec+='<div class="tasks-empty">\u6682\u65e0\u4efb\u52a1</div>';}
      else{
        for(var c=0;c<keys.length;c++){
          sec+='<div class="cat-title">'+keys[c]+'</div>';
          for(var t2=0;t2<cats[keys[c]].length;t2++){
            t=cats[keys[c]][t2]; icon=t.done?'\u2713':'&nbsp;'; cls=t.done?'task-check--done':'task-check--pending';
            sec+='<div class="day-task"><div class="task-check '+cls+'">'+icon+'</div><div class="task-body"><div class="task-text">'+esc(t.text)+'</div></div><span class="task-time">'+t.hours.toFixed(1)+'h</span></div>';
          }
        }
      }
      sec+='</div>';
    }
    document.getElementById('day-sections').innerHTML=sec;

    document.getElementById('page-info').textContent='\u7b2c'+(curPage+1)+'/'+totalPages+'\u9875';
    document.getElementById('btn-prev').disabled=curPage===0;
    document.getElementById('btn-next').disabled=curPage>=totalPages-1;

    
    var els=document.querySelectorAll('.day-tab');
    for(i=0;i<els.length;i++){!function(el){el.addEventListener('click',function(){
      var idx=parseInt(el.getAttribute('data-idx'));
      document.querySelectorAll('.day-tab').forEach(function(t){t.classList.remove('active');});
      el.classList.add('active');
      document.querySelectorAll('.day-section').forEach(function(s){s.classList.remove('active');});
      var tg=document.querySelector('.day-section[data-idx="'+idx+'"]'); if(tg) tg.classList.add('active');
    });}(els[i]);}

  observeReveal();

  }

  window.goPage=function(dir){
    var np=curPage+dir; if(np<0||np>=totalPages)return; curPage=np; renderPage();
  };

  renderPage();

  
  function observeReveal() {
    var els = document.querySelectorAll('.template-tasks .tasks-stat-card, .template-tasks .day-tab, .template-tasks .day-task, .template-tasks .day-header, .template-tasks .cat-title');
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting && !entry.target.classList.contains('reveal-visible')) {
          entry.target.classList.add('reveal-visible');
          obs.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });
    els.forEach(function(el) {
      if (!el.classList.contains('reveal-visible') && !el.classList.contains('_obs')) {
        el.classList.add('_obs');
        obs.observe(el);
      }
    });
  }
  observeReveal();


  window.addEventListener('resize',function(){var np=window.innerWidth<768?3:5;if(np!==PER_PAGE){PER_PAGE=np;curPage=0;renderPage();renderStats(calcStats());}});
})();
</script>

<script>
    (function () {
        const motion = window.__blogMotion = window.__blogMotion || {
            resources: {},
            live2d: { loading: false, initialized: false, failed: false },
            pjaxReady: false
        };

        function normalizeUrl(url) {
            return new URL(url, window.location.href).href;
        }

        function loadExternalResource(url, type) {
            const absoluteUrl = normalizeUrl(url);
            if (motion.resources[absoluteUrl]) return motion.resources[absoluteUrl];

            const selector = type === "css"
                ? `link[rel="stylesheet"][href="${absoluteUrl}"],link[rel="stylesheet"][href="${url}"]`
                : `script[src="${absoluteUrl}"],script[src="${url}"]`;
            const existing = document.querySelector(selector);
            if (existing) {
                motion.resources[absoluteUrl] = Promise.resolve(absoluteUrl);
                return motion.resources[absoluteUrl];
            }

            motion.resources[absoluteUrl] = new Promise((resolve, reject) => {
                let tag;
                if (type === "css") {
                    tag = document.createElement("link");
                    tag.rel = "stylesheet";
                    tag.href = url;
                } else {
                    tag = document.createElement("script");
                    tag.src = url;
                    tag.defer = false;
                }
                tag.dataset.blogMotionResource = absoluteUrl;
                tag.onload = () => resolve(absoluteUrl);
                tag.onerror = () => {
                    delete motion.resources[absoluteUrl];
                    reject(new Error(`资源加载失败: ${url}`));
                };
                document.head.appendChild(tag);
            });
            return motion.resources[absoluteUrl];
        }

        function removeLegacyWaifuPlaceholders() {
            document.querySelectorAll("#waifu").forEach((node) => {
                if (!node.querySelector("#live2d")) node.remove();
            });
            document.querySelectorAll("#waifu-tips").forEach((node) => {
                if (!node.closest("#waifu")) node.remove();
            });
        }

        function ensureLive2DLauncher() {
            if (document.getElementById("blog-live2d-launch")) return;
            const launcher = document.createElement("button");
            launcher.id = "blog-live2d-launch";
            launcher.type = "button";
            launcher.setAttribute("aria-label", "显示看板娘");
            launcher.innerHTML = "<span class='blog-live2d-launch__spark'>?</span><span class='blog-live2d-launch__tip'>按一下有惊喜</span>";
            launcher.addEventListener("click", () => showLive2D());
            document.body.appendChild(launcher);
        }

        async function initLive2D() {
            if (motion.live2d.initialized || motion.live2d.loading) return motion.live2d.promise;

            motion.live2d.loading = true;
            motion.live2d.failed = false;
            removeLegacyWaifuPlaceholders();

            const config = {
                path: {
                    homePath: "/",
                    modelPath: "/Resources/",
                    cssPath: "/waifu/waifu.css",
                    tipsJsonPath: "/waifu/waifu-tips.json",
                    tipsJsPath: "/waifu/waifu-tips.js",
                    live2dCorePath: "/waifu/live2dcubismcore.js",
                    live2dSdkPath: "/waifu/live2d-sdk.js"
                },
                tools: ["hitokoto", "asteroids", "express", "photo", "quit"],
                drag: { enable: false, direction: ["x", "y"] },
                switchType: "order"
            };

            motion.live2d.promise = Promise.all([
                loadExternalResource(config.path.cssPath, "css"),
                loadExternalResource(config.path.live2dCorePath, "js"),
                loadExternalResource(config.path.live2dSdkPath, "js"),
                loadExternalResource(config.path.tipsJsPath, "js")
            ]).then(() => {
                if (typeof window.initWidget !== "function") {
                    throw new Error("initWidget 未定义，请检查 waifu-tips.js");
                }
                localStorage.setItem("waifu-display", Date.now());
                window.initWidget({
                    waifuPath: config.path.tipsJsonPath,
                    cdnPath: config.path.modelPath,
                    tools: config.tools,
                    dragEnable: config.drag.enable,
                    dragDirection: config.drag.direction,
                    switchType: config.switchType,
                    homePath: config.path.homePath
                });
                motion.live2d.initialized = true;
            }).catch((err) => {
                motion.live2d.failed = true;
                motion.live2d.promise = null;
                console.error("Live2D 资源加载失败:", err);
            }).finally(() => {
                motion.live2d.loading = false;
            });

            return motion.live2d.promise;
        }

        async function showLive2D() {
            const launcher = document.getElementById("blog-live2d-launch");
            launcher?.classList.add("is-loading");
            await initLive2D();
            const nativeToggle = document.getElementById("waifu-toggle");
            if (!document.getElementById("waifu") && nativeToggle) nativeToggle.click();
            const waifu = document.getElementById("waifu");
            if (waifu) {
                waifu.style.display = "";
                requestAnimationFrame(() => waifu.classList.add("blog-waifu-visible"));
            }
            launcher?.classList.remove("is-loading");
            launcher?.classList.add("is-hidden");
        }

        function bindLive2DQuit() {
            if (motion.live2dQuitBound) return;
            motion.live2dQuitBound = true;
            document.addEventListener("click", (event) => {
                const quit = event.target.closest("#waifu-tool-quit");
                if (!quit) return;
                const waifu = document.getElementById("waifu");
                const launcher = document.getElementById("blog-live2d-launch");
                waifu?.classList.remove("blog-waifu-visible");
                window.setTimeout(() => {
                    launcher?.classList.remove("is-hidden", "is-loading");
                }, 2600);
            });
        }

        function delay(time) {
            return new Promise(resolve => setTimeout(resolve, time));
        }

        async function renderKaTeX() {
            if (!document.querySelector(".math-katex")) return;
            while (typeof renderMathInElement !== "function") {
                await delay(500);
            }
            renderMathInElement(document.body, {
                delimiters: [
                    { left: "$$", right: "$$", display: true },
                    { left: "$", right: "$", display: false },
                    { left: "\\(", right: "\\)", display: false },
                    { left: "\\[", right: "\\]", display: true }
                ],
                ignoredClasses: ["gist"]
            });
        }

        function syncBodyClass(responseText) {
            if (!responseText || !responseText.match("<html")) return;
            const newDom = new DOMParser().parseFromString(responseText, "text/html");
            document.body.setAttribute("class", newDom.body.className || "");
        }

        function initBackToTop() {
            const btn = document.getElementById("back-to-top");
            if (!btn || btn.dataset.ready) return;
            btn.dataset.ready = "true";
            btn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

            const sentinel = document.createElement("div");
            sentinel.style.cssText = "position:absolute;top:300px;left:0;height:1px;width:1px;pointer-events:none";
            document.body.appendChild(sentinel);
            new IntersectionObserver((entries) => {
                btn.classList.toggle("visible", !entries[0].isIntersecting);
            }, { rootMargin: "0px" }).observe(sentinel);
        }

        function runPageInitializers() {
            ensureLive2DLauncher();
            bindLive2DQuit();
            if (window.BlogHomeHero) window.BlogHomeHero.init();
            if (window.BlogSakura) window.BlogSakura.init();
            if (window.__blogReveal && typeof window.__blogReveal.observe === "function") {
                window.__blogReveal.observe(document);
            }
        }

        function scrollAfterPjax() {
            if (!document.body.classList.contains("template-home")) {
                window.scrollTo({ top: 0, left: 0, behavior: "auto" });
                return;
            }

            window.scrollTo({ top: 0, left: 0, behavior: "auto" });
        }

        function initPjaxOnce() {
            if (typeof window.Pjax !== "function" || motion.pjaxReady) return;
            motion.pjaxReady = true;

            if (typeof topbar !== "undefined") {
                topbar.config({
                    barColors: { "0": "rgba(255,255,255,1)", "1.0": "rgba(0,149,234,1)" }
                });
            }

            window.pjax = window.pjax || new Pjax({
                selectors: [".main-container"]
            });

            if (window.pjax && window.pjax.handleResponse && !window.pjax.__blogMotionWrapped) {
                const originalHandleResponse = window.pjax.handleResponse.bind(window.pjax);
                window.pjax.handleResponse = function (responseText, request, href, options) {
                    const html = responseText || (request && request.responseText) || "";
                    syncBodyClass(html);
                    return originalHandleResponse(responseText, request, href, options);
                };
                window.pjax.__blogMotionWrapped = true;
            }

            document.addEventListener("pjax:send", () => {
                if (typeof topbar !== "undefined") topbar.show();
            });

            document.addEventListener("pjax:complete", () => {
                if (typeof topbar !== "undefined") topbar.hide();
                scrollAfterPjax();
                if (window.Stack && typeof window.Stack.init === "function") window.Stack.init();
                renderKaTeX();
                runPageInitializers();
            });
        }

        function bootstrapMotion() {
            initBackToTop();
            initPjaxOnce();
            renderKaTeX();
            runPageInitializers();
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", bootstrapMotion, { once: true });
        } else {
            bootstrapMotion();
        }

        window.renderKaTeX = renderKaTeX;
        window.initLive2DForPC = showLive2D;
    })();
</script>
